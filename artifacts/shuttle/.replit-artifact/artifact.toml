kind = "web"
previewPath = "/"
title = "Smart Shuttle Solution"
version = "1.0.0"
id = "artifacts/shuttle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23133

[services.development]
run = "pnpm --filter @workspace/shuttle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shuttle", "run", "build" ]
publicDir = "artifacts/shuttle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23133"
BASE_PATH = "/"
